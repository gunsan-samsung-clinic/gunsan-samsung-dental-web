<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>군산 삼성치과</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ================= HEADER ================= -->

<div class="card">

  <h3>관리자 로그인</h3>

  <input
    id="email"
    placeholder="이메일">

  <input
    id="password"
    type="password"
    placeholder="비밀번호">

  <button id="loginBtn">
    로그인
  </button>

  <button id="logoutBtn">
    로그아웃
  </button>

</div>
  
  <header>
    <h1>🦷 군산 삼성치과</h1>
    <p>정직한 진료 · 편안한 치료 · 신뢰받는 의료</p>
  </header>

  <!-- ================= HERO SECTION ================= -->
  <section class="hero">
    <div class="hero-content">
      <h2>건강한 미소를 위한 첫걸음</h2>
      <p>최신 의료 기술과 따뜻한 진료로 당신의 치아를 지켜드립니다.</p>

      <button class="cta-btn">📅 예약 상담하기</button>
    </div>
  </section>

  <!-- ================= MAIN LAYOUT ================= -->
  <div class="container">

   <div class="memo-section">

  <h3>📌 공지사항</h3>

  <div id="eventList"></div>

  <div id="eventAdmin">

    <input
      id="eventTitle"
      placeholder="공지 제목">

    <textarea
      id="eventContent"
      placeholder="공지 내용"></textarea>

    <button id="saveEvent">
      공지 등록
    </button>

  </div>

</div>

    <!-- 📰 뉴스 -->

 <div class="news-section">

  <h3>📰 병원 소식</h3>

  <div id="newsList"></div>

  <div id="newsAdmin">

    <input
      id="newsTitle"
      placeholder="소식 제목">

    <textarea
      id="newsContent"
      placeholder="소식 내용"></textarea>

    <button id="saveNews">
      소식 등록
    </button>

  </div>

</div>

     
    <!-- ⭐ 리뷰 -->
    <div class="review-section">

  <h3>⭐ 환자 후기</h3>

  <input
    id="reviewWriter"
    placeholder="작성자">

  <textarea
    id="reviewText"
    placeholder="후기 작성"></textarea>

  <button id="reviewBtn">
    후기 등록
  </button>

  <div id="reviewList"></div>

</div>

     <div class="memo-section">

  <h3>📝 환자 메모</h3>

  <input
    id="memoWriter"
    placeholder="작성자">

  <textarea
    id="memoText"
    placeholder="메모 작성"></textarea>

  <button id="memoBtn">
    메모 등록
  </button>
       
</div>
  <div id="memoList"></div>

</div>
   

  <!-- ================= FOOTER ================= -->
  <footer>
    <p>© 2026 군산 삼성치과. All rights reserved.</p>
  </footer>

  <script type="module" src="app.js"></script>

</body>
</html>

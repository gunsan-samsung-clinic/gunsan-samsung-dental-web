<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>군산 삼성치과</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>


<header>

<div class="logo">
🦷 군산 삼성치과 고객관리
</div>

<button id="adminBtn">
관리자
</button>

</header>



<div class="container">


<!-- 1분 치아상식 -->

<section class="content-card">

<h2>
🦷 1분 치아상식
</h2>

<div class="video-card">

<img src="clinic1.jpg">

<p>
치아 건강 정보를 확인하세요
</p>

</div>

</section>




<!-- 릴스 -->

<section class="content-card">


<h2>
🎬 릴스
</h2>


<div class="hero-video">


<video
autoplay
muted
loop
playsinline>


<source
src="videosevent1.mp4"
type="video/mp4">


</video>


</div>


</section>





<!-- 이벤트 -->


<section class="content-card">


<h2>
🎁 이벤트
</h2>


<div id="eventList"></div>


</section>





<!-- 공지 -->

<section class="content-card">


<h2>
📢 공지사항
</h2>


<div id="newsList"></div>


</section>





<!-- 질의문답 -->

<section class="content-card">


<h2>
❓ 질의문답
</h2>


<div id="questionList"></div>


</section>





<!-- 후기 -->

<section class="content-card">


<h2>
⭐ 후기
</h2>


<div id="reviewList"></div>


</section>




</div>


<script type="module" src="app.js"></script>


</body>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>군산 삼성치과</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header>
    <h1>🦷 군산 삼성치과</h1>
    <p>정직한 진료 · 편안한 치료 · 신뢰받는 의료</p>
  </header>

  <!-- ================= HERO SECTION ================= -->
  <section class="hero">
    <div class="hero-content">
      <h2>건강한 미소를 위한 첫걸음</h2>
      <p>최신 의료 기술과 따뜻한 진료로 당신의 치아를 지켜드립니다.</p>

      <button class="cta-btn">📅 예약 상담하기</button>
    </div>
  </section>

  <!-- ================= MAIN LAYOUT ================= -->
  <div class="container">

    <!-- 📝 메모 / 공지 -->
    <div class="memo-section">
      <h3>📌 공지사항</h3>

     <div class="memo-section">

  <h3>📌 공지사항</h3>

  <div id="eventList"></div>

  <div id="eventAdmin">

    <input
      id="eventTitle"
      placeholder="제목">

    <textarea
      id="eventContent"
      placeholder="내용"></textarea>

    <button id="saveEvent">
      공지 등록
    </button>

  </div>

</div>

      <div class="memo-card">
        <p>✔ 야간 진료 시간 변경 안내</p>
      </div>

      <input placeholder="공지 작성">
      <button>등록</button>
    </div>

    <!-- 📰 뉴스 -->
   <div class="news-section">

  <h3>📰 병원 소식</h3>

  <div id="newsList"></div>

  <div id="newsAdmin">

    <input
      id="newsTitle"
      placeholder="제목">

    <textarea
      id="newsContent"
      placeholder="내용"></textarea>

    <button id="saveNews">
      소식 등록
    </button>

  </div>

</div>
    <!-- ⭐ 리뷰 -->
    <div class="review-section">
      <h3>⭐ 환자 후기</h3>

      <div class="review-card">
        <p>“진짜 친절하고 설명 잘해주세요!”</p>
      </div>

      <div class="review-card">
        <p>“통증 없이 치료받아서 좋았어요”</p>
      </div>
    </div>

  </div>

  <!-- ================= FOOTER ================= -->
  <footer>
    <p>© 2026 군산 삼성치과. All rights reserved.</p>
  </footer>

</body>
</html>

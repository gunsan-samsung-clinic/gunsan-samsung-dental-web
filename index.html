<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>군산 삼성치과</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>


<header>

  <div class="logo">
    🦷 군산 삼성치과 고객관리
  </div>

  <button id="adminBtn">
    관리자
  </button>

</header>



<div class="container">


  <!-- 첫 화면 영상 -->

  <section class="hero-video">

    <video
      autoplay
      muted
      loop
      playsinline>

      <source
      src="videosevent1.mp4"
      type="video/mp4">

    </video>


  </section>



  <!-- 이벤트 -->

  <section class="content-card">

    <h2>🎁 이벤트</h2>

    <div id="eventList"></div>

  </section>



  <!-- 공지 -->

  <section class="content-card">

    <h2>📢 공지사항</h2>

    <div id="newsList"></div>

  </section>



  <!-- 후기 -->

  <section class="content-card">

    <h2>⭐ 후기</h2>

    <div id="reviewList"></div>

  </section>



</div>



<script type="module" src="app.js"></script>


</body>
</html>
